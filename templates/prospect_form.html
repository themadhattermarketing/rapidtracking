{% extends 'base.html' %}
{% block content %}
<h2>Add Prospect</h2>
<form method="post">
    <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" name="name" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Note</label>
        <input type="text" class="form-control" name="note">
    </div>
    <div class="mb-3">
        <label class="form-label">Color</label>
        <input type="text" class="form-control" name="color">
    </div>
    <div class="mb-3">
        <label class="form-label">Demo Date</label>
        <input type="date" class="form-control" name="demo_date">
    </div>
    <div class="mb-3">
        <label class="form-label">Review Date</label>
        <input type="date" class="form-control" name="review_date">
    </div>
    <div class="mb-3">
        <label class="form-label">Onboarding Date</label>
        <input type="date" class="form-control" name="onboarding_date">
    </div>
    <div class="mb-3">
        <label class="form-label">Price</label>
        <input type="number" step="0.01" class="form-control" name="price">
    </div>
    <div class="mb-3">
        <label class="form-label">Product</label>
        <input type="text" class="form-control" name="product">
    </div>
    <div class="mb-3">
        <label class="form-label">Integration Fee</label>
        <input type="number" step="0.01" class="form-control" name="integration_fee">
    </div>
    <div class="mb-3">
        <label class="form-label">Package Type</label>
        <input type="text" class="form-control" name="package_type">
    </div>
    <div class="mb-3">
        <label class="form-label">Closer</label>
        <select class="form-select" name="closer">
            <option value="">--</option>
            {% for r in reps %}
            <option value="{{ r.id }}">{{ r.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="mb-3">
        <label class="form-label">Setter</label>
        <select class="form-select" name="setter">
            <option value="">--</option>
            {% for r in reps %}
            <option value="{{ r.id }}">{{ r.name }}</option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
